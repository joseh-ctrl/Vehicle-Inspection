<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Inspection — WS Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ---------- CONFIG-DRIVEN THEME ---------- */
:root{
  --grad: linear-gradient(135deg,#1EB8D9 0%,#1D6FB8 55%,#0C447C 100%);
  --navy:#0C447C; --navy-d:#08315c; --blue:#1D6FB8; --cyan:#1EB8D9;
  --ink:#0f1b2d; --muted:#5b6b80; --line:#e4e9f0; --bg:#f4f7fb;
  --good:#1a9e5f; --good-bg:#e7f6ee; --flag:#e0892a; --flag-bg:#fdf1e3;
  --danger:#d64545; --card:#fff; --radius:16px;
  --shadow:0 1px 2px rgba(12,68,124,.06),0 8px 24px rgba(12,68,124,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:15px}
.hidden{display:none!important}

/* ---------- HEADER ---------- */
header{background:var(--grad);color:#fff;padding:18px 20px;position:sticky;top:0;z-index:20;box-shadow:0 4px 20px rgba(12,68,124,.18)}
.hwrap{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brand .logo{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:21px;flex-shrink:0}
.brand h1{font-size:16px;font-weight:700;letter-spacing:-.2px;line-height:1.1}
.brand p{font-size:11.5px;opacity:.8;font-weight:500}
.mode-toggle{display:flex;background:rgba(255,255,255,.14);border-radius:10px;padding:3px}
.mode-toggle button{color:#fff;opacity:.72;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:7px;display:flex;align-items:center;gap:5px}
.mode-toggle button.active{background:#fff;color:var(--navy);opacity:1}

main{max-width:820px;margin:0 auto;padding:22px 16px 60px}

/* ---------- CARDS / GENERIC ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.pad{padding:20px}
.section-title{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:7px}
label.fld{display:block;margin-bottom:14px}
label.fld .lbl{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block}
.control{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;background:#fbfcfe;transition:.15s;color:var(--ink)}
.control:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(29,111,184,.1)}
textarea.control{resize:vertical;min-height:64px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.row2{grid-template-columns:1fr}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:15px;padding:14px 20px;border-radius:12px;transition:.15s;width:100%}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(29,111,184,.28)}
.btn-primary:active{transform:translateY(1px)}
.btn-ghost{background:#eef3f9;color:var(--navy)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:9px 14px;font-size:13px;width:auto}

/* ---------- CHECKLIST ---------- */
.check-item{border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:10px;transition:.15s;background:#fff}
.check-item.flagged{border-color:var(--flag);background:var(--flag-bg)}
.ci-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.ci-name{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14.5px}
.ci-name i{font-size:19px;color:var(--blue);width:22px;text-align:center}
.seg{display:flex;background:#eef2f7;border-radius:9px;padding:3px;flex-shrink:0}
.seg button{font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:6px;color:var(--muted);transition:.12s}
.seg button.on-good{background:var(--good);color:#fff}
.seg button.on-flag{background:var(--flag);color:#fff}
.ci-note{margin-top:11px}
.ci-note input{width:100%;padding:9px 12px;border:1.5px solid var(--flag);border-radius:9px;background:#fff;font-size:13.5px}
.ci-note input:focus{outline:none;box-shadow:0 0 0 3px rgba(224,137,42,.15)}

.banner{border-radius:13px;padding:14px 16px;display:flex;gap:11px;align-items:flex-start;margin-bottom:18px;font-size:14px}
.banner i{font-size:20px;flex-shrink:0;margin-top:1px}
.banner.open{background:#fef6e9;border:1px solid #f6d99f;color:#8a5a12}
.banner.info{background:#e9f2fb;border:1px solid #bcd7f2;color:var(--navy)}
.banner strong{display:block;margin-bottom:2px}

/* ---------- HR DASHBOARD ---------- */
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
@media(max-width:560px){.tiles{grid-template-columns:1fr}}
.tile{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.tile .n{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
.tile .l{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:5px;display:flex;align-items:center;gap:6px}
.tile.flag .n{color:var(--flag)} .tile.open .n{color:var(--blue)} .tile.done .n{color:var(--good)}

.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filters button{font-size:13px;font-weight:600;padding:8px 14px;border-radius:20px;background:#fff;border:1px solid var(--line);color:var(--muted)}
.filters button.active{background:var(--navy);color:#fff;border-color:var(--navy)}

.trip{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 15px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
.trip:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(29,111,184,.1)}
.trip-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.trip .who{font-weight:700;font-size:15px}
.trip .meta{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.3px;white-space:nowrap}
.pill.open{background:#fef6e9;color:#b06f13}
.pill.done{background:var(--good-bg);color:var(--good)}
.pill.flag{background:#fdeaea;color:var(--danger)}
.pill.rev{background:#eef2f7;color:var(--muted)}
.flag-preview{margin-top:9px;font-size:12.5px;color:var(--flag);background:var(--flag-bg);border-radius:8px;padding:7px 10px;display:flex;gap:7px}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(8,25,48,.5);z-index:50;display:grid;place-items:end center;padding:0}
.sheet{background:#fff;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;animation:up .25s ease}
@media(min-width:641px){.overlay{place-items:center}.sheet{border-radius:20px;max-height:88vh}}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet-head{position:sticky;top:0;background:#fff;padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;z-index:2}
.sheet-head h3{font-size:18px;font-weight:700}
.sheet-head .x{width:34px;height:34px;border-radius:9px;background:#eef2f7;display:grid;place-items:center;font-size:18px;color:var(--muted)}
.leg{padding:16px 20px;border-bottom:1px solid var(--line)}
.leg h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.kv{display:flex;gap:8px;font-size:14px;margin-bottom:6px}.kv b{color:var(--muted);font-weight:600;min-width:96px}
.issue-row{background:var(--flag-bg);border-left:3px solid var(--flag);padding:9px 12px;border-radius:0 8px 8px 0;margin:7px 0;font-size:13.5px}
.issue-row b{color:var(--flag)}
.all-good{color:var(--good);font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:7px}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty i{font-size:46px;opacity:.4;display:block;margin-bottom:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy-d);color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;z-index:80;box-shadow:0 8px 30px rgba(0,0,0,.3);display:flex;align-items:center;gap:9px;animation:up .2s}
.gate{max-width:360px;margin:40px auto;text-align:center}
.gate i{font-size:40px;color:var(--blue)}

/* ---------- PHOTOS ---------- */
.photos-section{margin-bottom:16px}
.photo-add{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--navy);background:#eef3f9;border:1.5px dashed #b9cde3;border-radius:11px;padding:12px 16px;cursor:pointer;transition:.15s}
.photo-add:active{transform:translateY(1px)}
.photo-add i{font-size:19px}
.thumbs{display:flex;flex-wrap:wrap;gap:9px;margin-top:11px}
.thumb{position:relative;width:76px;height:76px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .rm{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:6px;background:rgba(8,25,48,.7);color:#fff;display:grid;place-items:center;font-size:14px}
.hr-thumb{width:88px;height:88px;border-radius:10px;overflow:hidden;border:1px solid var(--line);cursor:pointer}
.hr-thumb img{width:100%;height:100%;object-fit:cover;display:block}

/* ---------- OPEN-TRIP / IN-PROGRESS ---------- */
.op-wrap{margin-top:18px}
.op-card{background:#fff;border:1px solid #f6d99f;border-left:4px solid var(--flag);border-radius:13px;padding:14px 15px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;gap:12px}
.op-card .who{font-weight:700;font-size:14.5px}
.op-card .meta{font-size:12px;color:var(--muted);margin-top:3px}
.big-check{width:64px;height:64px;border-radius:18px;background:var(--good-bg);color:var(--good);display:grid;place-items:center;font-size:34px;margin:0 auto 14px}

/* ---------- LIGHTBOX ---------- */
.lightbox{position:fixed;inset:0;background:rgba(4,12,24,.92);z-index:90;display:grid;place-items:center;padding:20px}
.lightbox img{max-width:100%;max-height:100%;border-radius:10px}
.lightbox .x{position:absolute;top:18px;right:18px;width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.15);color:#fff;display:grid;place-items:center;font-size:22px}
</style>
</head>
<body>

<header>
  <div class="hwrap">
    <div class="brand">
      <div class="logo"><i class="ti ti-car"></i></div>
      <div>
        <h1 id="coName">WS Display</h1>
        <p>Vehicle Inspection</p>
      </div>
    </div>
    <div class="mode-toggle">
      <button id="mDriver" class="active" onclick="setMode('driver')"><i class="ti ti-steering-wheel"></i> Driver</button>
      <button id="mHR" onclick="setMode('hr')"><i class="ti ti-shield-check"></i> HR</button>
    </div>
  </div>
</header>

<main>
  <div id="driverView"></div>
  <div id="hrView" class="hidden"></div>
</main>

<div id="modalRoot"></div>

<script>
/* =====================================================================
   CONFIG  — edit these lists to match your fleet & team
   ===================================================================== */
const CONFIG = {
  company: "WS Display",
  drivers: ["Jose Hernandez","Anahi Torres","Stephanie Bryan"],
  vehicles: ["Ford Transit — CA (7XYZ123)","Chevy Express — PA (JKL4567)","Nissan NP300 — MX (ABC-12-34)"],
  hrPasscode: "052107",       // used only if Supabase is NOT configured (fallback)
  retentionMonths: 12,        // reports older than this are auto-removed

  // ---- Supabase (leave key as-is to run in local-only mode) ----
  supabaseUrl: "https://zozpomjvvrhjgqbazmrd.supabase.co",
  supabaseAnonKey: "sb_publishable_sKcs24iSLfda4g7gvXJcAw_HlmuLsdf",
};

/* Pre-trip checklist — short, "Good" by default, flag only exceptions */
const PRE_ITEMS = [
  {id:"tires",   name:"Tires & wheels",         icon:"ti-alert-octagon"},
  {id:"lights",  name:"Lights & signals",       icon:"ti-bulb"},
  {id:"glass",   name:"Windshield & mirrors",   icon:"ti-windmill"},
  {id:"brakes",  name:"Brakes feel normal",     icon:"ti-disc"},
  {id:"dash",    name:"Fluids / dash warnings", icon:"ti-dashboard"},
  {id:"safety",  name:"Seatbelts & horn",       icon:"ti-seatbelt"},
  {id:"body",    name:"Exterior body (walk-around)", icon:"ti-car-crash"},
];
/* Post-trip — even shorter */
const POST_ITEMS = [
  {id:"newdmg",  name:"New damage or malfunction", icon:"ti-alert-triangle"},
  {id:"fuel",    name:"Fuel level OK",             icon:"ti-gas-station"},
  {id:"clean",   name:"Returned clean & locked",   icon:"ti-lock"},
];

/* =====================================================================
   STORAGE  (localStorage now; swap Store.load/save for Supabase later)
   ===================================================================== */
const KEY="wsvi_trips";
const Store={
  all(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}},
  save(list){localStorage.setItem(KEY,JSON.stringify(list))},
  upsert(t){const l=this.all();const i=l.findIndex(x=>x.id===t.id);i>=0?l[i]=t:l.unshift(t);this.save(l)},
  openTripFor(driver){return this.all().find(t=>t.driver===driver&&t.status==="open")},
  purgeOld(){
    const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-CONFIG.retentionMonths);
    const l=this.all(); const kept=l.filter(t=>new Date(t.createdAt)>=cutoff);
    if(kept.length!==l.length)this.save(kept);
    return l.length-kept.length;
  },
};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const now=()=>new Date().toISOString();
const fmt=iso=>iso?new Date(iso).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"—";

/* =====================================================================
   SUPABASE  (system of record for HR; drivers submit anonymously)
   Runs in local-only mode until a real anon key is set in CONFIG.
   ===================================================================== */
const SUPA_ON = !!CONFIG.supabaseAnonKey && !CONFIG.supabaseAnonKey.includes("PASTE");
const sb = SUPA_ON ? supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey) : null;

const tripToRow = t => ({
  id:t.id, driver:t.driver, vehicle:t.vehicle, status:t.status,
  created_at:t.createdAt, pre:t.pre, post:t.post,
  hr_reviewed:!!t.hrReviewed, hr_note:t.hrNote||null, reviewed_at:t.reviewedAt||null
});
const rowToTrip = r => ({
  id:r.id, driver:r.driver, vehicle:r.vehicle, status:r.status,
  createdAt:r.created_at, pre:r.pre, post:r.post,
  hrReviewed:r.hr_reviewed, hrNote:r.hr_note||"", reviewedAt:r.reviewed_at||null
});

const Cloud = {
  async push(trip){                     // driver submit -> upsert row (no read-back needed)
    if(!SUPA_ON) return;
    const {error}=await sb.from("vehicle_inspections").upsert(tripToRow(trip));
    if(error){console.error(error); toast("Saved on device — cloud sync failed","ti-cloud-off");}
  },
  async fetchAll(){
    const {data,error}=await sb.from("vehicle_inspections").select("*").order("created_at",{ascending:false});
    if(error){console.error(error); toast("Couldn't load records","ti-cloud-off"); return [];}
    return data.map(rowToTrip);
  },
  async review(trip){
    const {error}=await sb.from("vehicle_inspections")
      .update({hr_reviewed:true,hr_note:trip.hrNote,reviewed_at:trip.reviewedAt}).eq("id",trip.id);
    if(error){console.error(error); toast("Save failed","ti-cloud-off");}
  },
  async remove(id){ await sb.from("vehicle_inspections").delete().eq("id",id); },
  async purge(){                        // HR-side retention (authenticated delete)
    const c=new Date(); c.setMonth(c.getMonth()-CONFIG.retentionMonths);
    await sb.from("vehicle_inspections").delete().lt("created_at",c.toISOString());
  },
  auth:{
    async session(){ const {data}=await sb.auth.getSession(); return data.session; },
    async signIn(email,pw){ return sb.auth.signInWithPassword({email,password:pw}); },
    async signOut(){ await sb.auth.signOut(); }
  }
};
/* HR data source: Supabase when configured, else local */
let hrTrips=[];
const hrSource = () => SUPA_ON ? hrTrips : Store.all();

/* =====================================================================
   MODE SWITCH
   ===================================================================== */
let mode="driver";
function setMode(m){
  mode=m; toggleMode();
  if(m==="driver"){ renderDriver(); return; }
  if(!window._hrOK){ renderGate(); return; }
  SUPA_ON ? loadHR() : renderHR();
}
function toggleMode(){
  mDriver.classList.toggle("active",mode==="driver");
  mHR.classList.toggle("active",mode==="hr");
  driverView.classList.toggle("hidden",mode!=="driver");
  hrView.classList.toggle("hidden",mode!=="hr");
}

/* =====================================================================
   DRIVER VIEW
   ===================================================================== */
function optionList(arr){return arr.map(v=>`<option value="${esc(v)}">`).join("")}

/* Landing: start-new form + list of any open trips to complete */
function renderDriver(){
  const openTrips=Store.all().filter(t=>t.status==="open");
  driverView.innerHTML=`
   <div class="card pad">
     <div class="section-title"><i class="ti ti-user-check"></i> Start a new trip</div>
     <div class="row2">
       <label class="fld"><span class="lbl">Driver</span>
         <input id="dDriver" class="control" list="dl-drivers" placeholder="Your name" autocomplete="off">
         <datalist id="dl-drivers">${optionList(CONFIG.drivers)}</datalist></label>
       <label class="fld"><span class="lbl">Vehicle</span>
         <input id="dVeh" class="control" list="dl-veh" placeholder="Select vehicle" autocomplete="off">
         <datalist id="dl-veh">${optionList(CONFIG.vehicles)}</datalist></label>
     </div>
     <button class="btn btn-primary" onclick="driverContinue()"><i class="ti ti-arrow-right"></i> Start pre-trip check</button>
   </div>
   ${openTrips.length?`
   <div class="op-wrap">
     <div class="section-title"><i class="ti ti-clock-hour-4"></i> Trips in progress — tap to finish</div>
     ${openTrips.map(t=>`
       <div class="op-card">
         <div><div class="who">${esc(t.driver)}</div>
           <div class="meta">${esc(t.vehicle)} · out since ${fmt(t.pre.at)}</div></div>
         <button class="btn btn-primary btn-sm" onclick="renderPost('${t.id}')"><i class="ti ti-flag-check"></i> Post-trip</button>
       </div>`).join("")}
   </div>`:""}
   <div id="dForm" style="margin-top:18px"></div>`;
}
function driverContinue(){
  const driver=val("dDriver"), veh=val("dVeh");
  if(!driver){return toast("Enter your name")}
  const open=Store.openTripFor(driver);
  if(open){ return renderPost(open.id); }  // already has an open trip
  if(!veh){return toast("Select a vehicle")}
  renderPre(driver,veh);
}

/* ---- Shared checklist ---- */
function checklistHTML(items){
  return items.map(it=>`
   <div class="check-item" id="ci-${it.id}" data-state="good">
     <div class="ci-top">
       <div class="ci-name"><i class="ti ${it.icon}"></i>${it.name}</div>
       <div class="seg">
         <button type="button" class="on-good" onclick="setState('${it.id}','good')">Good</button>
         <button type="button" onclick="setState('${it.id}','flag')">Issue</button>
       </div>
     </div>
     <div class="ci-note hidden"><input placeholder="What's the issue?"></div>
   </div>`).join("");
}
function setState(id,s){
  const el=document.getElementById("ci-"+id);
  el.dataset.state=s;
  el.classList.toggle("flagged",s==="flag");
  el.querySelector(".ci-note").classList.toggle("hidden",s!=="flag");
  const [g,f]=el.querySelectorAll(".seg button");
  g.className=s==="good"?"on-good":""; f.className=s==="flag"?"on-flag":"";
}
function collectChecklist(items){
  const flagged=[];
  items.forEach(it=>{
    const el=document.getElementById("ci-"+it.id);
    if(el&&el.dataset.state==="flag"){
      flagged.push({item:it.name, note:el.querySelector(".ci-note input").value.trim()||"(no detail)"});
    }
  });
  return flagged;
}

/* ---- Photos (compressed base64; swap to Supabase Storage later) ---- */
let prePhotos=[], postPhotos=[];
function photoBlock(phase){
  return `<div class="photos-section">
     <label class="photo-add"><i class="ti ti-camera"></i> Add photos
       <input type="file" accept="image/*" capture="environment" multiple hidden onchange="handlePhotos(this,'${phase}')"></label>
     <div class="thumbs" id="${phase}Thumbs"></div>
   </div>`;
}
function compress(file){return new Promise(res=>{
  const rd=new FileReader();
  rd.onload=e=>{const img=new Image();img.onload=()=>{
    const max=1100;let{width:w,height:h}=img;
    if(w>h&&w>max){h=Math.round(h*max/w);w=max}else if(h>max){w=Math.round(w*max/h);h=max}
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    res(c.toDataURL("image/jpeg",0.72));
  };img.src=e.target.result;};
  rd.readAsDataURL(file);
})}
async function handlePhotos(input,phase){
  const arr=phase==="pre"?prePhotos:postPhotos;
  for(const f of input.files){ if(arr.length>=8){toast("Up to 8 photos");break;} arr.push(await compress(f)); }
  input.value=""; renderThumbs(phase);
}
function renderThumbs(phase){
  const arr=phase==="pre"?prePhotos:postPhotos;
  document.getElementById(phase+"Thumbs").innerHTML=arr.map((src,i)=>`
    <div class="thumb"><img src="${src}"><button class="rm" onclick="rmPhoto('${phase}',${i})"><i class="ti ti-x"></i></button></div>`).join("");
}
function rmPhoto(phase,i){ (phase==="pre"?prePhotos:postPhotos).splice(i,1); renderThumbs(phase); }

/* ---- Pre-trip ---- */
function renderPre(driver,veh){
  prePhotos=[];
  document.getElementById("dForm").innerHTML=`
   <div class="banner info"><i class="ti ti-info-circle"></i>
     <div><strong>Pre-trip check</strong>Everything's marked Good — just flag anything that isn't, add the odometer, snap any photos, and start.</div></div>
   <div class="card pad">
     <div class="section-title"><i class="ti ti-list-check"></i> Walk-around</div>
     ${checklistHTML(PRE_ITEMS)}
     <label class="fld" style="margin-top:6px"><span class="lbl">Starting odometer</span>
       <input id="preOdo" class="control" type="number" inputmode="numeric" placeholder="e.g. 48210"></label>
     <div class="section-title" style="margin-top:4px"><i class="ti ti-photo"></i> Photos (optional)</div>
     ${photoBlock("pre")}
     <label class="fld"><span class="lbl">Notes (optional)</span>
       <textarea id="preNotes" class="control" placeholder="Anything else HR should know"></textarea></label>
     <button class="btn btn-primary" onclick="submitPre('${esc(driver)}','${esc(veh)}')"><i class="ti ti-circle-check"></i> Start trip</button>
   </div>`;
  document.getElementById("dForm").scrollIntoView({behavior:"smooth",block:"start"});
}
function submitPre(driver,veh){
  const trip={id:uid(),driver,vehicle:veh,status:"open",createdAt:now(),
    pre:{at:now(),odometer:val("preOdo"),flagged:collectChecklist(PRE_ITEMS),notes:val("preNotes"),photos:prePhotos.slice()},
    post:null, hrReviewed:false, hrNote:""};
  Store.upsert(trip);
  prePhotos=[];
  Cloud.push(trip);
  renderInProgress(trip);
}

/* ---- In-progress confirmation (bridges pre -> post) ---- */
function renderInProgress(trip){
  driverView.innerHTML=`
   <div class="card pad" style="text-align:center">
     <div class="big-check"><i class="ti ti-circle-check"></i></div>
     <h3 style="font-size:19px;font-weight:700">Trip started — drive safe</h3>
     <p style="color:var(--muted);font-size:14px;margin:6px 0 18px">${esc(trip.vehicle)}<br>When you're back, run the post-trip check to close it out.</p>
     <button class="btn btn-primary" onclick="renderPost('${trip.id}')"><i class="ti ti-flag-check"></i> I'm back — start post-trip</button>
     <button class="btn btn-ghost" style="margin-top:10px" onclick="renderDriver()">Not yet — back to start</button>
   </div>`;
}

/* ---- Post-trip ---- */
function renderPost(id){
  const trip=Store.all().find(t=>t.id===id); if(!trip)return renderDriver();
  postPhotos=[];
  driverView.innerHTML=`
   <div class="banner open"><i class="ti ti-clock-hour-4"></i>
     <div><strong>Post-trip check — ${esc(trip.driver)}</strong>${esc(trip.vehicle)} · started ${fmt(trip.pre.at)}. Flag anything that came up, then submit.</div></div>
   <div class="card pad">
     <div class="section-title"><i class="ti ti-flag-check"></i> On return</div>
     ${checklistHTML(POST_ITEMS)}
     <label class="fld" style="margin-top:6px"><span class="lbl">Ending odometer</span>
       <input id="postOdo" class="control" type="number" inputmode="numeric" placeholder="Odometer on return"></label>
     <div class="section-title" style="margin-top:4px"><i class="ti ti-photo"></i> Photos (optional — great for damage)</div>
     ${photoBlock("post")}
     <label class="fld"><span class="lbl">Notes (optional)</span>
       <textarea id="postNotes" class="control" placeholder="Anything that happened on the trip"></textarea></label>
     <button class="btn btn-primary" onclick="submitPost('${trip.id}')"><i class="ti ti-send"></i> Submit post-trip report</button>
     <button class="btn btn-ghost" style="margin-top:10px" onclick="renderDriver()">Back</button>
   </div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}
function submitPost(id){
  const trip=Store.all().find(t=>t.id===id); if(!trip)return;
  trip.post={at:now(),odometer:val("postOdo"),flagged:collectChecklist(POST_ITEMS),notes:val("postNotes"),photos:postPhotos.slice()};
  trip.status="completed";
  Store.upsert(trip);
  postPhotos=[];
  Cloud.push(trip);
  driverView.innerHTML=`
   <div class="card pad" style="text-align:center">
     <div class="big-check"><i class="ti ti-circle-check"></i></div>
     <h3 style="font-size:19px;font-weight:700">Report submitted — thanks</h3>
     <p style="color:var(--muted);font-size:14px;margin:6px 0 18px">This trip is complete and visible to HR.</p>
     <button class="btn btn-primary" onclick="renderDriver()"><i class="ti ti-home"></i> Done</button>
   </div>`;
  window.scrollTo({top:0,behavior:"smooth"});
}

/* =====================================================================
   HR VIEW
   ===================================================================== */
function renderGate(){
  hrView.innerHTML = SUPA_ON ? `
   <div class="gate">
     <i class="ti ti-shield-lock"></i>
     <h3 style="margin:10px 0 4px">HR sign in</h3>
     <p style="color:var(--muted);font-size:14px;margin-bottom:16px">Sign in to review inspections.</p>
     <input id="hrEmail" class="control" type="email" placeholder="Email" autocomplete="username" style="margin-bottom:10px">
     <input id="hrPw" class="control" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()">
     <button class="btn btn-primary" style="margin-top:12px" onclick="doSignIn()"><i class="ti ti-login-2"></i> Sign in</button>
   </div>` : `
   <div class="gate">
     <i class="ti ti-lock"></i>
     <h3 style="margin:10px 0 4px">HR access</h3>
     <p style="color:var(--muted);font-size:14px;margin-bottom:16px">Enter the passcode to review inspections.</p>
     <input id="pc" class="control" type="password" placeholder="Passcode" onkeydown="if(event.key==='Enter')checkGate()">
     <button class="btn btn-primary" style="margin-top:12px" onclick="checkGate()">Unlock</button>
   </div>`;
}
function checkGate(){
  if(val("pc")===CONFIG.hrPasscode){window._hrOK=true;renderHR();}
  else toast("Wrong passcode");
}
async function doSignIn(){
  const email=val("hrEmail"), pw=val("hrPw");
  if(!email||!pw)return toast("Enter email and password");
  const {error}=await Cloud.auth.signIn(email,pw);
  if(error)return toast("Sign in failed — check credentials");
  window._hrOK=true; await loadHR();
}
async function loadHR(){
  hrView.innerHTML=`<div class="empty"><i class="ti ti-loader"></i>Loading records…</div>`;
  await Cloud.purge();               // enforce 12-month retention server-side
  hrTrips=await Cloud.fetchAll();
  renderHR();
}
async function hrSignOut(){ await Cloud.auth.signOut(); window._hrOK=false; renderGate(); }
let hrFilter="all";
function tripFlagCount(t){
  let n=(t.pre?.flagged?.length||0);
  // post: only "new damage" counts as an issue; fuel/clean not-good also worth surfacing
  n+=(t.post?.flagged?.length||0);
  return n;
}
function renderHR(){
  if(!window._hrOK)return renderGate();
  const trips=hrSource();
  const open=trips.filter(t=>t.status==="open").length;
  const flagged=trips.filter(t=>tripFlagCount(t)>0).length;
  const weekAgo=Date.now()-6048e5;
  const done=trips.filter(t=>t.status==="completed"&&new Date(t.createdAt)>weekAgo).length;

  const list=trips.filter(t=>{
    if(hrFilter==="open")return t.status==="open";
    if(hrFilter==="flag")return tripFlagCount(t)>0;
    if(hrFilter==="done")return t.status==="completed";
    return true;
  });

  hrView.innerHTML=`
   ${SUPA_ON?`<div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px">
     <button class="btn btn-ghost btn-sm" onclick="loadHR()"><i class="ti ti-refresh"></i> Refresh</button>
     <button class="btn btn-ghost btn-sm" onclick="hrSignOut()"><i class="ti ti-logout"></i> Sign out</button>
   </div>`:""}
   <div class="tiles">
     <div class="tile open"><div class="n">${open}</div><div class="l"><i class="ti ti-clock-hour-4"></i> Open trips</div></div>
     <div class="tile flag"><div class="n">${flagged}</div><div class="l"><i class="ti ti-flag"></i> With issues</div></div>
     <div class="tile done"><div class="n">${done}</div><div class="l"><i class="ti ti-circle-check"></i> Done this week</div></div>
   </div>
   <div class="filters">
     ${["all","open","flag","done"].map(f=>`<button class="${hrFilter===f?'active':''}" onclick="hrFilter='${f}';renderHR()">${({all:"All",open:"Open",flag:"Issues",done:"Completed"})[f]}</button>`).join("")}
   </div>
   <div id="tripList">${list.length?list.map(tripCard).join(""):emptyState()}</div>
   <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:18px"><i class="ti ti-history"></i> Records roll off automatically after ${CONFIG.retentionMonths} months.</p>`;
}
function tripCard(t){
  const flags=tripFlagCount(t);
  const status = t.hrReviewed?`<span class="pill rev">Reviewed</span>`
    : t.status==="open"?`<span class="pill open">Open</span>`
    : flags>0?`<span class="pill flag">${flags} issue${flags>1?"s":""}</span>`
    : `<span class="pill done">Completed</span>`;
  const firstFlag=(t.pre?.flagged||[]).concat(t.post?.flagged||[])[0];
  return `<div class="trip" onclick='openTrip("${t.id}")'>
     <div class="trip-top">
       <div><div class="who">${esc(t.driver)}</div>
         <div class="meta"><span><i class="ti ti-car" style="font-size:13px"></i> ${esc(t.vehicle)}</span><span><i class="ti ti-clock" style="font-size:13px"></i> ${fmt(t.pre?.at)}</span></div></div>
       ${status}
     </div>
     ${firstFlag?`<div class="flag-preview"><i class="ti ti-alert-triangle"></i><span><b>${esc(firstFlag.item)}:</b> ${esc(firstFlag.note)}</span></div>`:""}
   </div>`;
}
function emptyState(){return `<div class="empty"><i class="ti ti-inbox"></i>No inspections yet.<br>They'll appear here as drivers submit them.</div>`}

/* ---- Trip detail modal ---- */
function legHTML(title,icon,leg,flagLabel){
  if(!leg)return `<div class="leg"><h4><i class="ti ${icon}"></i> ${title}</h4><div style="color:var(--muted);font-size:13.5px">Not completed yet.</div></div>`;
  const flags=leg.flagged||[]; const photos=leg.photos||[];
  return `<div class="leg">
    <h4><i class="ti ${icon}"></i> ${title} · ${fmt(leg.at)}</h4>
    <div class="kv"><b>Odometer</b><span>${esc(leg.odometer)||"—"}</span></div>
    ${flags.length
      ? flags.map(f=>`<div class="issue-row"><b>${esc(f.item)}</b> — ${esc(f.note)}</div>`).join("")
      : `<div class="all-good"><i class="ti ti-circle-check"></i> ${flagLabel}</div>`}
    ${leg.notes?`<div class="kv" style="margin-top:8px"><b>Notes</b><span>${esc(leg.notes)}</span></div>`:""}
    ${photos.length?`<div class="thumbs" style="margin-top:10px">${photos.map(p=>`<div class="hr-thumb" onclick="lightbox('${p}')"><img src="${p}"></div>`).join("")}</div>`:""}
  </div>`;
}
function lightbox(src){
  const el=document.createElement("div");el.className="lightbox";
  el.onclick=()=>el.remove();
  el.innerHTML=`<button class="x"><i class="ti ti-x"></i></button><img src="${src}">`;
  document.body.appendChild(el);
}
function openTrip(id){
  const t=hrSource().find(x=>x.id===id); if(!t)return;
  modalRoot.innerHTML=`
   <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div class="sheet-head">
        <div><h3>${esc(t.driver)}</h3>
          <div style="font-size:13px;color:var(--muted);margin-top:2px">${esc(t.vehicle)}</div></div>
        <button class="x" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      ${legHTML("Pre-trip","ti-list-check",t.pre,"All checks good")}
      ${legHTML("Post-trip","ti-flag-check",t.post,"No issues on return")}
      <div class="leg">
        <h4><i class="ti ti-shield-check"></i> HR review</h4>
        ${t.hrReviewed?`<div class="all-good" style="margin-bottom:10px"><i class="ti ti-circle-check"></i> Reviewed ${fmt(t.reviewedAt)}</div>`:""}
        <label class="fld"><textarea id="hrNote" class="control" placeholder="Notes — what you found, how it was addressed">${esc(t.hrNote||"")}</textarea></label>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary btn-sm" onclick="markReviewed('${t.id}')"><i class="ti ti-check"></i> ${t.hrReviewed?"Save note":"Mark reviewed & save"}</button>
          <button class="btn btn-danger btn-sm" onclick="delTrip('${t.id}')"><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </div>
   </div>`;
}
async function markReviewed(id){
  const t=hrSource().find(x=>x.id===id);if(!t)return;
  const first=!t.hrReviewed;
  t.hrReviewed=true;t.hrNote=val("hrNote");t.reviewedAt=now();
  if(SUPA_ON){ await Cloud.review(t); }
  else{ const l=Store.all();const lt=l.find(x=>x.id===id);Object.assign(lt,t);Store.save(l); }
  closeModal();toast(first?"Marked reviewed":"Note saved","ti-check");renderHR();
}
async function delTrip(id){
  if(!confirm("Delete this inspection record?"))return;
  if(SUPA_ON){ await Cloud.remove(id); hrTrips=hrTrips.filter(x=>x.id!==id); }
  else{ Store.save(Store.all().filter(x=>x.id!==id)); }
  closeModal();renderHR();
}
function closeModal(){modalRoot.innerHTML=""}

/* =====================================================================
   HELPERS
   ===================================================================== */
function val(id){return document.getElementById(id)?.value.trim()||""}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
let toastT;
function toast(msg,icon="ti-alert-circle"){
  const el=document.createElement("div");el.className="toast";
  el.innerHTML=`<i class="ti ${icon}"></i>${esc(msg)}`;document.body.appendChild(el);
  clearTimeout(toastT);toastT=setTimeout(()=>el.remove(),2400);
}

/* init */
coName.textContent=CONFIG.company;
Store.purgeOld();
renderDriver();
if(SUPA_ON){ Cloud.auth.session().then(s=>{ if(s) window._hrOK=true; }); }
</script>
</body>
</html>
