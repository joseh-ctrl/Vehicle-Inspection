<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Inspection — WS Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ---------- CONFIG-DRIVEN THEME ---------- */
:root{
  --grad: linear-gradient(135deg,#1EB8D9 0%,#1D6FB8 55%,#0C447C 100%);
  --navy:#0C447C; --navy-d:#08315c; --blue:#1D6FB8; --cyan:#1EB8D9;
  --ink:#0f1b2d; --muted:#64748b; --line:#e8edf4; --bg:#eef3f9;
  --good:#12a150; --good-bg:#e6f7ee; --flag:#e08517; --flag-bg:#fdf2e3;
  --danger:#e03e3e; --danger-bg:#fdeaea; --card:#fff; --radius:20px;
  --shadow:0 1px 2px rgba(12,68,124,.05),0 10px 30px -12px rgba(12,68,124,.14);
  --shadow-lg:0 20px 50px -18px rgba(12,68,124,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45;
  background:radial-gradient(1200px 500px at 50% -200px,#dcedfb 0%,var(--bg) 60%) fixed}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:15px}
.hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
main>div>*{animation:fadeUp .35s ease both}

/* ---------- HEADER ---------- */
header{background:var(--grad);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:20;box-shadow:0 8px 30px -8px rgba(12,68,124,.45);overflow:hidden}
header::after{content:"";position:absolute;right:-60px;top:-90px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.14),transparent 68%);pointer-events:none}
.hwrap{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;z-index:1}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand .logo{width:42px;height:42px;border-radius:13px;background:rgba(255,255,255,.18);backdrop-filter:blur(4px);display:grid;place-items:center;font-size:23px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
.brand h1{font-size:16.5px;font-weight:800;letter-spacing:-.3px;line-height:1.1}
.brand p{font-size:11.5px;opacity:.82;font-weight:500;letter-spacing:.2px}
.mode-toggle{display:flex;background:rgba(255,255,255,.16);border-radius:12px;padding:4px}
.mode-toggle button{color:#fff;opacity:.75;font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:8px;display:flex;align-items:center;gap:5px;transition:.18s}
.mode-toggle button.active{background:#fff;color:var(--navy);opacity:1;box-shadow:0 2px 8px rgba(0,0,0,.12)}

main{max-width:820px;margin:0 auto;padding:22px 16px 60px}

/* ---------- CARDS / GENERIC ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.pad{padding:22px}
.section-title{font-size:11.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title i{font-size:16px;color:var(--blue)}
label.fld{display:block;margin-bottom:14px}
label.fld .lbl{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px;display:block}
.control{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:12px;background:#f8fafc;transition:.15s;color:var(--ink)}
.control:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(29,111,184,.12)}
textarea.control{resize:vertical;min-height:64px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.row2{grid-template-columns:1fr}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:650;font-size:15px;padding:15px 20px;border-radius:14px;transition:.18s;width:100%;letter-spacing:.1px}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 22px -6px rgba(29,111,184,.55)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 26px -6px rgba(29,111,184,.6)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:#eef3f9;color:var(--navy)}
.btn-ghost:hover{background:#e3ecf6}
.btn-danger{background:var(--danger);color:#fff;box-shadow:0 8px 22px -8px rgba(224,62,62,.6)}
.btn-sm{padding:10px 15px;font-size:13px;width:auto;border-radius:11px}

/* ---------- CHECKLIST ---------- */
.check-item{border:1px solid var(--line);border-radius:15px;padding:13px 15px;margin-bottom:10px;transition:.18s;background:#fff;position:relative}
.check-item:hover{border-color:#d4deea}
.check-item.flagged{border-color:var(--flag);background:var(--flag-bg)}
.check-item.critical{border-color:#cfe0f5;background:linear-gradient(180deg,#f5f9ff,#fff)}
.check-item.critical.flagged{border-color:var(--danger);background:var(--danger-bg)}
.ci-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.ci-name{display:flex;align-items:center;gap:12px;font-weight:600;font-size:14.5px}
.ci-ico{width:38px;height:38px;border-radius:11px;background:#eef4fb;color:var(--blue);display:grid;place-items:center;flex-shrink:0}
.ci-ico i{font-size:20px}
.check-item.critical .ci-ico{background:#e4eefb;color:var(--navy)}
.check-item.flagged .ci-ico{background:#fbe9d3;color:var(--flag)}
.check-item.critical.flagged .ci-ico{background:#f9d9d9;color:var(--danger)}
.seg{display:flex;background:#eef2f7;border-radius:11px;padding:3px;flex-shrink:0}
.seg button{font-size:12.5px;font-weight:650;padding:7px 14px;border-radius:8px;color:var(--muted);transition:.14s}
.seg button.on-good{background:var(--good);color:#fff;box-shadow:0 2px 6px rgba(18,161,80,.3)}
.seg button.on-flag{background:var(--flag);color:#fff;box-shadow:0 2px 6px rgba(224,133,23,.3)}
.ci-note{margin-top:12px}
.ci-note input{width:100%;padding:10px 13px;border:1.5px solid var(--flag);border-radius:10px;background:#fff;font-size:13.5px}
.ci-note input:focus{outline:none;box-shadow:0 0 0 3px rgba(224,133,23,.15)}

/* ---------- LEGEND / WARNING ---------- */
.legend{display:flex;gap:11px;align-items:flex-start;background:#fff8ee;border:1px solid #f3ddb4;border-radius:14px;padding:14px 15px;margin:4px 0 18px;font-size:13.5px;color:#7a531a}
.legend i{font-size:20px;color:var(--flag);flex-shrink:0;margin-top:1px}
.legend strong{display:block;color:var(--ink);margin-bottom:2px;font-size:14px}
.warn-badge{width:66px;height:66px;border-radius:20px;margin:0 auto;background:var(--danger-bg);color:var(--danger);display:grid;place-items:center;font-size:34px}
.warn-sheet{animation:pop .22s ease}
@keyframes pop{from{transform:scale(.94);opacity:.6}to{transform:scale(1);opacity:1}}

.banner{border-radius:15px;padding:14px 16px;display:flex;gap:11px;align-items:flex-start;margin-bottom:18px;font-size:14px}
.banner i{font-size:20px;flex-shrink:0;margin-top:1px}
.banner.open{background:#fef6e9;border:1px solid #f6d99f;color:#8a5a12}
.banner.info{background:#e9f2fb;border:1px solid #bcd7f2;color:var(--navy)}
.banner strong{display:block;margin-bottom:2px}

/* ---------- HR DASHBOARD ---------- */
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
@media(max-width:560px){.tiles{grid-template-columns:1fr}}
.tile{background:#fff;border:1px solid var(--line);border-radius:16px;padding:17px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
.tile.flag::before{background:var(--flag)} .tile.open::before{background:var(--blue)} .tile.done::before{background:var(--good)}
.tile .n{font-size:32px;font-weight:800;letter-spacing:-1.2px;line-height:1}
.tile .l{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:6px}
.tile.flag .n{color:var(--flag)} .tile.open .n{color:var(--blue)} .tile.done .n{color:var(--good)}

.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filters button{font-size:13px;font-weight:600;padding:8px 15px;border-radius:20px;background:#fff;border:1px solid var(--line);color:var(--muted);transition:.15s}
.filters button:hover{border-color:#c9d6e6}
.filters button.active{background:var(--navy);color:#fff;border-color:var(--navy)}

.trip{background:#fff;border:1px solid var(--line);border-radius:15px;padding:15px 16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:.18s}
.trip:hover{border-color:#bcd3ec;box-shadow:0 10px 24px -12px rgba(29,111,184,.35);transform:translateY(-1px)}
.trip-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.trip .who{font-weight:750;font-size:15px}
.trip .meta{font-size:12.5px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;letter-spacing:.3px;white-space:nowrap}
.pill.open{background:#fef6e9;color:#b06f13}
.pill.done{background:var(--good-bg);color:var(--good)}
.pill.flag{background:var(--danger-bg);color:var(--danger)}
.pill.rev{background:#eef2f7;color:var(--muted)}
.flag-preview{margin-top:10px;font-size:12.5px;color:var(--flag);background:var(--flag-bg);border-radius:10px;padding:8px 11px;display:flex;gap:7px}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(8,25,48,.5);z-index:50;display:grid;place-items:end center;padding:0}
.sheet{background:#fff;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;animation:up .25s ease}
@media(min-width:641px){.overlay{place-items:center}.sheet{border-radius:20px;max-height:88vh}}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet-head{position:sticky;top:0;background:#fff;padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;z-index:2}
.sheet-head h3{font-size:18px;font-weight:700}
.sheet-head .x{width:34px;height:34px;border-radius:9px;background:#eef2f7;display:grid;place-items:center;font-size:18px;color:var(--muted)}
.leg{padding:16px 20px;border-bottom:1px solid var(--line)}
.leg h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.kv{display:flex;gap:8px;font-size:14px;margin-bottom:6px}.kv b{color:var(--muted);font-weight:600;min-width:96px}
.issue-row{background:var(--flag-bg);border-left:3px solid var(--flag);padding:9px 12px;border-radius:0 8px 8px 0;margin:7px 0;font-size:13.5px}
.issue-row b{color:var(--flag)}
.all-good{color:var(--good);font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:7px}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty i{font-size:46px;opacity:.4;display:block;margin-bottom:12px}
.empty .ti-loader{animation:spin 1s linear infinite;opacity:.6;color:var(--blue)}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy-d);color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;z-index:80;box-shadow:0 8px 30px rgba(0,0,0,.3);display:flex;align-items:center;gap:9px;animation:up .2s}
.gate{max-width:360px;margin:40px auto;text-align:center}
.gate i{font-size:40px;color:var(--blue)}

/* ---------- PHOTOS ---------- */
.photos-section{margin-bottom:16px}
.photo-add{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--navy);background:#eef3f9;border:1.5px dashed #b9cde3;border-radius:11px;padding:12px 16px;cursor:pointer;transition:.15s}
.photo-add:active{transform:translateY(1px)}
.photo-add i{font-size:19px}
.thumbs{display:flex;flex-wrap:wrap;gap:9px;margin-top:11px}
.thumb{position:relative;width:76px;height:76px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .rm{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:6px;background:rgba(8,25,48,.7);color:#fff;display:grid;place-items:center;font-size:14px}
.hr-thumb{width:88px;height:88px;border-radius:10px;overflow:hidden;border:1px solid var(--line);cursor:pointer}
.hr-thumb img{width:100%;height:100%;object-fit:cover;display:block}

/* ---------- VEHICLE DOCUMENTS ---------- */
.doc-vehicle{border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;background:#fff}
.doc-veh-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:15px 16px;font-weight:700;font-size:15px;color:var(--ink)}
.doc-veh-btn span{display:flex;align-items:center;gap:10px}
.doc-veh-btn span i{font-size:20px;color:var(--blue)}
.doc-veh-btn .chev{font-size:18px;color:var(--muted);transition:transform .2s}
.doc-vehicle.open .doc-veh-btn .chev{transform:rotate(180deg)}
.doc-list{max-height:0;overflow:hidden;transition:max-height .28s ease;background:#f8fafc}
.doc-vehicle.open .doc-list{max-height:420px}
.doc-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--line);text-decoration:none;color:var(--ink);transition:.15s}
a.doc-row:hover{background:#eef4fb}
.doc-row.disabled{opacity:.55}
.doc-ico{width:36px;height:36px;border-radius:10px;background:#e9f0f9;color:var(--blue);display:grid;place-items:center;flex-shrink:0}
.doc-ico i{font-size:18px}
.doc-meta{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.3}
.doc-meta b{font-size:14px;font-weight:650}
.doc-meta small{font-size:11.5px;color:var(--muted)}
.doc-open{color:var(--blue);font-size:18px}

.hrdoc-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.hrdoc-row:first-of-type{border-top:none}
.hrdoc-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:36px;height:36px;border-radius:10px;background:#eef3f9;color:var(--navy);display:grid;place-items:center;font-size:17px;cursor:pointer;text-decoration:none;transition:.15s}
.icon-btn:hover{background:#e2ecf7}
.icon-btn.danger{background:var(--danger-bg);color:var(--danger)}

/* ---------- OPEN-TRIP / IN-PROGRESS ---------- */
.op-wrap{margin-top:18px}
.op-card{background:#fff;border:1px solid #f6d99f;border-left:4px solid var(--flag);border-radius:13px;padding:14px 15px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;gap:12px}
.op-card .who{font-weight:700;font-size:14.5px}
.op-card .meta{font-size:12px;color:var(--muted);margin-top:3px}
.big-check{width:64px;height:64px;border-radius:18px;background:var(--good-bg);color:var(--good);display:grid;place-items:center;font-size:34px;margin:0 auto 14px}

/* ---------- LIGHTBOX ---------- */
.lightbox{position:fixed;inset:0;background:rgba(4,12,24,.92);z-index:90;display:grid;place-items:center;padding:20px}
.lightbox img{max-width:100%;max-height:100%;border-radius:10px}
.lightbox .x{position:absolute;top:18px;right:18px;width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.15);color:#fff;display:grid;place-items:center;font-size:22px}
</style>
</head>
<body>

<header>
  <div class="hwrap">
    <div class="brand">
      <div class="logo"><i class="ti ti-car"></i></div>
      <div>
        <h1 id="coName">WS Display</h1>
        <p>Vehicle Inspection</p>
      </div>
    </div>
    <div class="mode-toggle">
      <button id="mDriver" class="active" onclick="setMode('driver')"><i class="ti ti-steering-wheel"></i> Driver</button>
      <button id="mHR" onclick="setMode('hr')"><i class="ti ti-shield-check"></i> HR</button>
    </div>
  </div>
</header>

<main>
  <div id="driverView"></div>
  <div id="hrView" class="hidden"></div>
</main>

<div id="modalRoot"></div>

<script>
/* =====================================================================
   CONFIG  — edit these lists to match your fleet & team
   ===================================================================== */
const CONFIG = {
  company: "WS Display",
  drivers: ["Mike Berret","Angel Coronel","Alex Escobar","Toan Tran","Kenny DeFrancisco","Richard De La Vega"],
  vehicles: ["Toyota Sienna","Honda LX"],
  hrPasscode: "052107",       // used only if Supabase is NOT configured (fallback)
  retentionMonths: 12,        // reports older than this are auto-removed

  // ---- Supabase (leave key as-is to run in local-only mode) ----
  supabaseUrl: "https://zozpomjvvrhjgqbazmrd.supabase.co",
  supabaseAnonKey: "PASTE_YOUR_ANON_KEY_HERE",
};

/* Pre-trip checklist — "Good" by default, flag only exceptions. */
const PRE_ITEMS = [
  {id:"tires",  name:"Tires & wheels",          icon:"ti-circle-dot"},
  {id:"lights", name:"Lights & signals",        icon:"ti-bulb"},
  {id:"glass",  name:"Windshield & mirrors",    icon:"ti-eye"},
  {id:"brakes", name:"Brakes & parking brake",  icon:"ti-hand-stop"},
  {id:"dash",   name:"Fluids & dashboard warning lights", icon:"ti-dashboard"},
  {id:"safety", name:"Seatbelts & horn",        icon:"ti-seatbelt"},
  {id:"body",   name:"Exterior body (walk-around)", icon:"ti-car-crash"},
];
/* Post-trip — even shorter */
const POST_ITEMS = [
  {id:"newdmg", name:"New damage or malfunction", icon:"ti-alert-triangle"},
  {id:"fuel",   name:"Fuel level OK",             icon:"ti-gas-station"},
  {id:"clean",  name:"Returned clean & locked",   icon:"ti-lock"},
];
/* Vehicle documents HR uploads and drivers can view any time */
const DOC_TYPES = [
  {id:"registration", name:"Registration",       icon:"ti-file-text"},
  {id:"insurance",    name:"Proof of insurance", icon:"ti-shield-check"},
  {id:"mx_insurance", name:"Mexico insurance",   icon:"ti-map-pin"},
];

/* =====================================================================
   STORAGE  (localStorage now; swap Store.load/save for Supabase later)
   ===================================================================== */
const KEY="wsvi_trips";
const Store={
  all(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}},
  save(list){localStorage.setItem(KEY,JSON.stringify(list))},
  upsert(t){const l=this.all();const i=l.findIndex(x=>x.id===t.id);i>=0?l[i]=t:l.unshift(t);this.save(l)},
  openTripFor(driver){return this.all().find(t=>t.driver===driver&&t.status==="open")},
  purgeOld(){
    const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-CONFIG.retentionMonths);
    const l=this.all(); const kept=l.filter(t=>new Date(t.createdAt)>=cutoff);
    if(kept.length!==l.length)this.save(kept);
    return l.length-kept.length;
  },
};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const now=()=>new Date().toISOString();
const fmt=iso=>iso?new Date(iso).toLocaleString([], {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"—";

/* =====================================================================
   SUPABASE  (system of record for HR; drivers submit anonymously)
   Runs in local-only mode until a real anon key is set in CONFIG.
   ===================================================================== */
const SUPA_ON = !!CONFIG.supabaseAnonKey && !CONFIG.supabaseAnonKey.includes("PASTE");
const sb = SUPA_ON ? supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey) : null;

const tripToRow = t => ({
  id:t.id, driver:t.driver, vehicle:t.vehicle, status:t.status,
  created_at:t.createdAt, pre:t.pre, post:t.post,
  hr_reviewed:!!t.hrReviewed, hr_note:t.hrNote||null, reviewed_at:t.reviewedAt||null
});
const rowToTrip = r => ({
  id:r.id, driver:r.driver, vehicle:r.vehicle, status:r.status,
  createdAt:r.created_at, pre:r.pre, post:r.post,
  hrReviewed:r.hr_reviewed, hrNote:r.hr_note||"", reviewedAt:r.reviewed_at||null
});

const Cloud = {
  async push(trip){                     // driver submit -> upsert row (no read-back needed)
    if(!SUPA_ON) return;
    const {error}=await sb.from("vehicle_inspections").upsert(tripToRow(trip));
    if(error){console.error(error); toast("Saved on device — cloud sync failed","ti-cloud-off");}
  },
  async fetchAll(){
    const {data,error}=await sb.from("vehicle_inspections").select("*").order("created_at",{ascending:false});
    if(error){console.error(error); toast("Couldn't load records","ti-cloud-off"); return [];}
    return data.map(rowToTrip);
  },
  async review(trip){
    const {error}=await sb.from("vehicle_inspections")
      .update({hr_reviewed:true,hr_note:trip.hrNote,reviewed_at:trip.reviewedAt}).eq("id",trip.id);
    if(error){console.error(error); toast("Save failed","ti-cloud-off");}
  },
  async remove(id){ await sb.from("vehicle_inspections").delete().eq("id",id); },
  async purge(){                        // HR-side retention (authenticated delete)
    const c=new Date(); c.setMonth(c.getMonth()-CONFIG.retentionMonths);
    await sb.from("vehicle_inspections").delete().lt("created_at",c.toISOString());
  },
  // ---- Vehicle documents (PDFs in Storage + metadata table) ----
  async fetchDocs(){
    if(!SUPA_ON) return {};
    const {data,error}=await sb.from("vehicle_documents").select("*");
    if(error){console.error(error); return {};}
    const map={};
    data.forEach(r=>{(map[r.vehicle]=map[r.vehicle]||{})[r.doc_type]={path:r.path,updatedAt:r.updated_at};});
    return map;
  },
  docUrl(path,ver){
    const base=sb.storage.from("vehicle-docs").getPublicUrl(path).data.publicUrl;
    return ver ? `${base}?v=${encodeURIComponent(ver)}` : base;
  },
  async uploadDoc(vehicle,docType,file){
    const path=`${slug(vehicle)}/${docType}.pdf`;
    const up=await sb.storage.from("vehicle-docs").upload(path,file,{upsert:true,contentType:"application/pdf"});
    if(up.error) throw up.error;
    const {error}=await sb.from("vehicle_documents").upsert({vehicle,doc_type:docType,path,updated_at:new Date().toISOString()});
    if(error) throw error;
  },
  async removeDoc(vehicle,docType){
    await sb.storage.from("vehicle-docs").remove([`${slug(vehicle)}/${docType}.pdf`]);
    await sb.from("vehicle_documents").delete().eq("vehicle",vehicle).eq("doc_type",docType);
  },
  auth:{
    async session(){ const {data}=await sb.auth.getSession(); return data.session; },
    async signIn(email,pw){ return sb.auth.signInWithPassword({email,password:pw}); },
    async signOut(){ await sb.auth.signOut(); }
  }
};

let prePhotos=[], postPhotos=[];
function photoBlock(phase){
  return `<div class="photos-section">
     <label class="photo-add"><i class="ti ti-camera"></i> Add photos
       <input type="file" accept="image/*" capture="environment" multiple hidden onchange="handlePhotos(this,'${phase}')"></label>
     <div class="thumbs" id="${phase}Thumbs"></div>
   </div>`;
}
function compress(file){return new Promise(res=>{
  const rd=new FileReader();
  rd.onload=e=>{const img=new Image();img.onload=()=>{
    const max=1100;let{width:w,height:h}=img;
    if(w>h&&w>max){h=Math.round(h*max/w);w=max}else if(h>max){w=Math.round(w*max/h);h=max}
    const c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    res(c.toDataURL("image/jpeg",0.72));
  };img.src=e.target.result;};
  rd.readAsDataURL(file);
})}
async function handlePhotos(input,phase){
  const arr=phase==="pre"?prePhotos:postPhotos;
  for(const f of input.files){ if(arr.length>=8){toast("Up to 8 photos");break;} arr.push(await compress(f)); }
  input.value=""; renderThumbs(phase);
}
function renderThumbs(phase){
  const arr=phase==="pre"?prePhotos:postPhotos;
  document.getElementById(phase+"Thumbs").innerHTML=arr.map((src,i)=>`
    <div class="thumb"><img src="${src}"><button class="rm" onclick="rmPhoto('${phase}',${i})"><i class="ti ti-x"></i></button></div>`).join("");
}
function rmPhoto(phase,i){ (phase==="pre"?prePhotos:postPhotos).splice(i,1); renderThumbs(phase); }

let hrFilter="all";

}
async function delTrip(id){
  if(!confirm("Delete this inspection record?"))return;
  if(SUPA_ON){ await Cloud.remove(id); hrTrips=hrTrips.filter(x=>x.id!==id); }
  else{ Store.save(Store.all().filter(x=>x.id!==id)); }
  closeModal();renderHR();
}
function closeModal(){modalRoot.innerHTML=""}

/* ---- HR: manage vehicle documents ---- */
function hrDocsModal(){
  modalRoot.innerHTML=`
   <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div class="sheet-head"><div><h3>Vehicle documents</h3>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">Upload or replace PDFs. Drivers see these on the main page.</div></div>
        <button class="x" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
      ${CONFIG.vehicles.map(v=>`
        <div class="leg">
          <h4><i class="ti ti-car"></i> ${esc(v)}</h4>
          ${DOC_TYPES.map(d=>{
            const rec=(vehicleDocs[v]||{})[d.id];
            return `<div class="hrdoc-row">
              <span class="doc-ico"><i class="ti ${d.icon}"></i></span>
              <span class="doc-meta"><b>${d.name}</b>
                <small>${rec?`Updated ${fmt(rec.updatedAt)}`:"Not uploaded"}</small></span>
              <span class="hrdoc-actions">
                ${rec?`<a class="icon-btn" href="${Cloud.docUrl(rec.path,rec.updatedAt)}" target="_blank" rel="noopener" title="View"><i class="ti ti-eye"></i></a>`:""}
                <label class="icon-btn" title="${rec?"Replace":"Upload"}"><i class="ti ti-upload"></i>
                  <input type="file" accept="application/pdf" hidden onchange="hrUploadDoc('${esc(v)}','${d.id}',this)"></label>
                ${rec?`<button class="icon-btn danger" title="Remove" onclick="hrRemoveDoc('${esc(v)}','${d.id}')"><i class="ti ti-trash"></i></button>`:""}
              </span>
            </div>`;
          }).join("")}
        </div>`).join("")}
      <div style="padding:16px 20px"><button class="btn btn-ghost" onclick="closeModal()">Done</button></div>
    </div>
   </div>`;
}
async function hrUploadDoc(vehicle,docType,input){
  const file=input.files[0]; input.value="";
  if(!file) return;
  if(file.type!=="application/pdf") return toast("PDF files only");
  if(file.size>15*1024*1024) return toast("File too large (max 15 MB)");
  toast("Uploading…","ti-upload");
  try{
    await Cloud.uploadDoc(vehicle,docType,file);
    vehicleDocs=await Cloud.fetchDocs();
    toast("Document saved","ti-check"); hrDocsModal();
  }catch(e){ console.error(e); toast("Upload failed — check bucket & policies","ti-cloud-off"); }
}
async function hrRemoveDoc(vehicle,docType){
  if(!confirm("Remove this document?")) return;
  try{ await Cloud.removeDoc(vehicle,docType); vehicleDocs=await Cloud.fetchDocs(); hrDocsModal(); }
  catch(e){ console.error(e); toast("Remove failed","ti-cloud-off"); }
}
function doNotDrive(){
  modalRoot.innerHTML=`
   <div class="overlay" style="place-items:center;padding:20px">
    <div class="sheet warn-sheet" style="border-radius:20px;max-width:420px">
      <div style="padding:26px 22px;text-align:center">
        <div class="warn-badge"><i class="ti ti-hand-stop"></i></div>
        <h3 style="font-size:20px;font-weight:800;margin:14px 0 8px">Do not drive this vehicle</h3>
        <p style="color:var(--muted);font-size:14.5px;line-height:1.5">Registration and/or proof of insurance is missing. Please <strong style="color:var(--ink)">contact HR</strong> about this issue before using the vehicle.</p>
        <p style="color:var(--muted);font-size:13px;margin-top:10px">You can still submit this report so HR is notified.</p>
        <button class="btn btn-danger" style="margin-top:18px" onclick="closeModal()">I understand</button>
      </div>
    </div>
   </div>`;
}

/* =====================================================================
   HELPERS
   ===================================================================== */
function val(id){return document.getElementById(id)?.value.trim()||""}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
let toastT;
function toast(msg,icon="ti-alert-circle"){
  const el=document.createElement("div");el.className="toast";
  el.innerHTML=`<i class="ti ${icon}"></i>${esc(msg)}`;document.body.appendChild(el);
  clearTimeout(toastT);toastT=setTimeout(()=>el.remove(),2400);
}

/* init */
coName.textContent=CONFIG.company;
Store.purgeOld();
renderDriver();
if(SUPA_ON){
  Cloud.auth.session().then(s=>{ if(s) window._hrOK=true; });
  Cloud.fetchDocs().then(d=>{ vehicleDocs=d; if(mode==="driver") renderDriver(); });
}
</script>
</body>
